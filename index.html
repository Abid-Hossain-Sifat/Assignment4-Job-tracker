<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job | Tracker</title>

    <!-- Tailwind + Daisy ui link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Front awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google front -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Style -->
    <style>
        * {
            font-family: Geist;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <header class="w-[90%] mx-auto md:w-[70%] md:pt-[60px]">
        <h1 class="text-[32px] font-bold text-[#002C5C] mb-5"> Job Application Tracker </h1>
        <div class="grid sm:grid-cols-1 mx-auto md:grid-cols-3 gap-[25px]">
            <div class="w-[430px] bg-white border border-2 border-[#F1F2F4] rounded-lg p-5">
                <p class="text-[14px] font-medium text-[#323B49]"> Total </p>
                <p id="total" class="text-2xl font-bold text-[#002C5C] mt-2"> 0 </p>
            </div>
            <div class="w-[430px] bg-white border border-2 border-[#F1F2F4] rounded-lg p-5">
                <p class="text-[14px] font-medium text-[#323B49]"> Interview </p>
                <p id="interview" class="text-2xl font-bold text-[#10B981] mt-2"> 0 </p>
            </div>
            <div class="w-[430px] bg-white border border-2 border-[#F1F2F4] rounded-lg p-5">
                <p class="text-[14px] font-medium text-[#323B49]"> Rejected </p>
                <p id="rejected" class="text-2xl font-bold text-[#EF4444] mt-2"> 0 </p>
            </div>
        </div>
    </header>
</body>

</html>
